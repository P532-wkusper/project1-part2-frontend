<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Trade Simulator Home</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header class="page-header">
		<nav class="nav">
			<a href="index.html">Home</a>
			<a href="portfolio.html">Portfolio</a>
			<a href="feed.html">Feed</a>
			<a href="history.html">History</a>
		</nav>
		<div style="float: right; padding: 10px;">
			<label for="user-select" style="color: white; margin-right: 5px;">User:</label>
			<select id="user-select" style="padding: 5px;">
				<option value="user1">user1</option>
				<option value="user2">user2</option>
				<option value="user3">user3</option>
			</select>
		</div>
	</header>

	<script>
		function getCurrentUser() {
			return localStorage.getItem('currentUserId') || 'user1';
		}

		function setCurrentUser(userId) {
			localStorage.setItem('currentUserId', userId);
			window.location.reload();
		}

		document.addEventListener('DOMContentLoaded', function() {
			const select = document.getElementById('user-select');
			select.value = getCurrentUser();
			select.addEventListener('change', function(e) {
				setCurrentUser(e.target.value);
			});
		});
	</script>

	<main class="container">
		<section class="card">
			<h1>Trade Simulator</h1>
			<p>Select a page:</p>
			<div class="button-row">
				<a href="portfolio.html"><button type="button">Portfolio</button></a>
				<a href="feed.html"><button type="button">Feed</button></a>
				<a href="order.html"><button type="button">Order</button></a>
				<a href="history.html"><button type="button">History</button></a>
			</div>
		</section>
	</main>
</body>
</html>
