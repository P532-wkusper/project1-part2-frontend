<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Trade Simulator Home</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header class="page-header">
		<nav class="nav">
			<a href="index.html">Home</a>
			<a href="portfolio.html">Portfolio</a>
			<a href="feed.html">Feed</a>
			<a href="history.html">History</a>
		</nav>
		<div style="float: right; padding: 10px;">
			<label for="user-select" style="color: white; margin-right: 15px;">User:</label>
			<select id="user-select" style="padding: 5px;">
				<option value="user1">user1</option>
				<option value="user2">user2</option>
				<option value="user3">user3</option>
			</select>
			<div id="notification-settings" style="display: inline-block; margin-left: 20px; vertical-align: top;">
				<label style="color: white; margin-right: 10px; font-weight: bold;">Notifications:</label>
				<label style="color: white; margin-right: 10px;"><input type="checkbox" id="console-notif" value="console"> Console</label>
				<label style="color: white; margin-right: 10px;"><input type="checkbox" id="email-notif" value="email"> Email</label>
				<label style="color: white; margin-right: 10px;"><input type="checkbox" id="sms-notif" value="sms"> SMS</label>
				<label style="color: white;"><input type="checkbox" id="dashboard-notif" value="dashboard"> Dashboard</label>
			</div>
		</div>
	</header>

	<script>
		let host = "https://trading-simulator-part2-latest.onrender.com";

		function showToast(message) {
			const container = document.getElementById('toast-container');
			if (!container) {
				console.error('Toast container not found');
				return;
			}
			const toast = document.createElement('div');
			toast.className = 'toast';
			toast.textContent = message;
			container.appendChild(toast);

			setTimeout(function() {
				toast.classList.add('removing');
				setTimeout(function() {
					toast.remove();
				}, 300);
			}, 15000);
		}

		function getCurrentUser() {
			return localStorage.getItem('currentUserId') || 'user1';
		}

		function setCurrentUser(userId) {
			localStorage.setItem('currentUserId', userId);
			loadNotificationSettings(userId);
		}

		function loadNotificationSettings(userId) {
			fetch(host + '/portfolio/notificationsettings?userId=' + userId)
				.then(response => response.json())
				.then(data => {
					document.getElementById('console-notif').checked = data.consoleEnabled;
					document.getElementById('email-notif').checked = data.emailEnabled;
					document.getElementById('sms-notif').checked = data.smsEnabled;
					document.getElementById('dashboard-notif').checked = data.dashboardEnabled;
				})
				.catch(error => console.error('Error loading notification settings:', error));
		}

		function updateNotificationSetting(userId, setting, enabled) {
			const params = new URLSearchParams();
			params.append('userId', userId);
			params.append(setting + 'Enabled', enabled);
			
			fetch(host + '/portfolio/notificationsettings', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/x-www-form-urlencoded'
				},
				body: params
			})
			.catch(error => console.error('Error updating notification setting:', error));
		}

		document.addEventListener('DOMContentLoaded', function() {
			const currentUser = getCurrentUser();
			const select = document.getElementById('user-select');
			select.value = currentUser;
			select.addEventListener('change', function(e) {
				setCurrentUser(e.target.value);
			});

			loadNotificationSettings(currentUser);

			document.getElementById('console-notif').addEventListener('change', function(e) {
				updateNotificationSetting(currentUser, 'console', e.target.checked);
			});
			document.getElementById('email-notif').addEventListener('change', function(e) {
				updateNotificationSetting(currentUser, 'email', e.target.checked);
			});
			document.getElementById('sms-notif').addEventListener('change', function(e) {
				updateNotificationSetting(currentUser, 'sms', e.target.checked);
			});
			document.getElementById('dashboard-notif').addEventListener('change', function(e) {
				updateNotificationSetting(currentUser, 'dashboard', e.target.checked);
				if (e.target.checked) {
					showToast('Dashboard notifications enabled');
				}
			});

			// Test toast on DOMContentLoaded
			setTimeout(function() {
				showToast('Test: Toast system is working!');
			}, 500);
		});
	</script>

	<main class="container">
		<section class="card">
			<h1>Trade Simulator</h1>
			<p>Select a page:</p>
			<div class="button-row">
				<a href="portfolio.html"><button type="button">Portfolio</button></a>
				<a href="feed.html"><button type="button">Feed</button></a>
				<a href="order.html"><button type="button">Order</button></a>
				<a href="history.html"><button type="button">History</button></a>
			</div>
		</section>
	</main>

	<div id="toast-container" class="toast-container"></div>
</body>
</html>
