<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="feed.html">Feed</a>
      <a href="history.html">History</a>
    </nav>
    <div style="float: right; padding: 10px;">
      <label for="user-select" style="color: white; margin-right: 15px;">User:</label>
      <select id="user-select" style="padding: 5px;">
        <option value="user1">user1</option>
        <option value="user2">user2</option>
        <option value="user3">user3</option>
      </select>
      <div id="notification-settings" style="display: inline-block; margin-left: 20px; vertical-align: top;">
        <label style="color: white; margin-right: 10px; font-weight: bold;">Notifications:</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="console-notif" value="console"> Console</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="email-notif" value="email"> Email</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="sms-notif" value="sms"> SMS</label>
        <label style="color: white;"><input type="checkbox" id="dashboard-notif" value="dashboard"> Dashboard</label>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Market Feed</h1>
      <p>Live stock prices appear below and refresh automatically.</p>
      
      <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #dcdcdc;">
        <p style="font-weight: bold; margin-bottom: 8px;">Pricing Algorithm:</p>
        <label style="margin-right: 20px;"><input type="radio" name="pricing-algo" value="randomwalk" checked> Random Walk</label>
        <label style="margin-right: 20px;"><input type="radio" name="pricing-algo" value="meanreversion"> Mean Reversion</label>
        <label><input type="radio" name="pricing-algo" value="trendfollowing"> Trend Following</label>
      </div>
    </section>

    <section class="card">
      <div id="stock-feed" class="stock-grid"></div>
    </section>
  </main>

  <script>
    let host = "https://trading-simulator-part2-latest.onrender.com";
    let stocks = [];

    function getCurrentUser() {
      return localStorage.getItem('currentUserId') || 'user1';
    }

    function setCurrentUser(userId) {
      localStorage.setItem('currentUserId', userId);
      window.location.reload();
    }

    function loadNotificationSettings(userId) {
      fetch(host + '/portfolio/notificationsettings?userId=' + userId)
        .then(response => response.json())
        .then(data => {
          document.getElementById('console-notif').checked = data.consoleEnabled;
          document.getElementById('email-notif').checked = data.emailEnabled;
          document.getElementById('sms-notif').checked = data.smsEnabled;
          document.getElementById('dashboard-notif').checked = data.dashboardEnabled;
        })
        .catch(error => console.error('Error loading notification settings:', error));
    }

    function updateNotificationSetting(userId, setting, enabled) {
      const params = new URLSearchParams();
      params.append('userId', userId);
      params.append(setting + 'Enabled', enabled);
      
      fetch(host + '/portfolio/notificationsettings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params
      })
      .catch(error => console.error('Error updating notification setting:', error));
    }

    function switchPricingAlgorithm(algorithm) {
      const params = new URLSearchParams();
      params.append('algorithm', algorithm);
      
      fetch(host + '/stocks/pricing-algorithm', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params
      })
      .then(response => response.text())
      .then(message => {
        console.log('Pricing algorithm: ' + message);
        localStorage.setItem('pricingAlgorithm', algorithm);
      })
      .catch(error => console.error('Error switching algorithm:', error));
    }

    function loadPricingAlgorithm() {
      const savedAlgorithm = localStorage.getItem('pricingAlgorithm') || 'randomwalk';
      const pricingRadios = document.querySelectorAll('input[name="pricing-algo"]');
      pricingRadios.forEach(radio => {
        radio.checked = radio.value === savedAlgorithm;
      });
    }

    function showToast(message) {
      const container = document.getElementById('toast-container');
      if (!container) {
        console.error('Toast container not found');
        return;
      }
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(function() {
        toast.classList.add('removing');
        setTimeout(function() {
          toast.remove();
        }, 300);
      }, 15000);
    }

    displayStocks();
    setInterval(refreshStocks, 5000);

    // Test toast on load
    window.addEventListener('load', function() {
      console.log('Page loaded, testing toast system');
      setTimeout(function() {
        showToast('Test: Toast system is working!');
      }, 500);
    });

    document.addEventListener('DOMContentLoaded', function() {
      const currentUser = getCurrentUser();
      const select = document.getElementById('user-select');
      select.value = currentUser;
      select.addEventListener('change', function(e) {
        setCurrentUser(e.target.value);
      });

      loadNotificationSettings(currentUser);

      loadPricingAlgorithm();

      document.getElementById('console-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'console', e.target.checked);
      });
      document.getElementById('email-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'email', e.target.checked);
      });
      document.getElementById('sms-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'sms', e.target.checked);
      });
      document.getElementById('dashboard-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'dashboard', e.target.checked);
        if (e.target.checked) {
          showToast('Dashboard notifications enabled');
        }
      });

      const pricingRadios = document.querySelectorAll('input[name="pricing-algo"]');
      pricingRadios.forEach(radio => {
        radio.addEventListener('change', function(e) {
          if (e.target.checked) {
            switchPricingAlgorithm(e.target.value);
          }
        });
      });
    });

    async function getAllStocks() {
      let response = await fetch(host + "/stocks");

      if (!response.ok) {
        throw new Error("Unable to load stock data.");
      }

      let result = await response.json();
      return result;
    }

    async function displayStocks() {
      let feed = document.getElementById("stock-feed");

      feed.innerHTML = "";

      try {
        if (stocks.length === 0) {
          stocks = await getAllStocks();
        }

        for (let stock of stocks) {
          let div = document.createElement("div");
          div.className = "stock-card";

          let price = Number(stock.price).toFixed(2);
          let tradeLink = "order.html?symbol=" + encodeURIComponent(stock.symbol);
          let innerHtml = `
            <h2>${stock.symbol}</h2>
            <p class="stock-price">$${price}</p>
            <p class="stock-label">Current market price</p>
            <p><a class="card-link" href="${tradeLink}">Trade ${stock.symbol}</a></p>
          `;

          div.innerHTML = innerHtml;
          feed.appendChild(div);
        }
      } catch (error) {
        feed.innerHTML = "<p>Unable to reach the backend right now.</p>";
      }
    }

    async function refreshStocks() {
      try {
        stocks = await getAllStocks();
        await displayStocks();
      } catch (error) {
      }
    }
  </script>

  <div id="toast-container" class="toast-container"></div>
</body>
</html>
