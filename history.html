<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="feed.html">Feed</a>
      <a href="history.html">History</a>
    </nav>
    <div style="float: right; padding: 10px;">
      <label for="user-select" style="color: white; margin-right: 15px;">User:</label>
      <select id="user-select" style="padding: 5px;">
        <option value="user1">user1</option>
        <option value="user2">user2</option>
        <option value="user3">user3</option>
      </select>
      <div id="notification-settings" style="display: inline-block; margin-left: 20px; vertical-align: top;">
        <label style="color: white; margin-right: 10px; font-weight: bold;">Notifications:</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="console-notif" value="console"> Console</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="email-notif" value="email"> Email</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="sms-notif" value="sms"> SMS</label>
        <label style="color: white;"><input type="checkbox" id="dashboard-notif" value="dashboard"> Dashboard</label>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Trade History</h1>
      <p>Executed trades are shown below, newest first.</p>
    </section>

    <section class="card">
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <script>
    let host = "https://trading-simulator-part2-latest.onrender.com";
    let trades = [];

    function getCurrentUser() {
      return localStorage.getItem('currentUserId') || 'user1';
    }

    function setCurrentUser(userId) {
      localStorage.setItem('currentUserId', userId);
      window.location.reload();
    }

    function loadNotificationSettings(userId) {
      fetch(host + '/portfolio/notificationsettings?userId=' + userId)
        .then(response => response.json())
        .then(data => {
          document.getElementById('console-notif').checked = data.consoleEnabled;
          document.getElementById('email-notif').checked = data.emailEnabled;
          document.getElementById('sms-notif').checked = data.smsEnabled;
          document.getElementById('dashboard-notif').checked = data.dashboardEnabled;
        })
        .catch(error => console.error('Error loading notification settings:', error));
    }

    function updateNotificationSetting(userId, setting, enabled) {
      const params = new URLSearchParams();
      params.append('userId', userId);
      params.append(setting + 'Enabled', enabled);
      
      fetch(host + '/portfolio/notificationsettings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params
      })
      .catch(error => console.error('Error updating notification setting:', error));
    }

    function showToast(message) {
      const container = document.getElementById('toast-container');
      if (!container) {
        console.error('Toast container not found');
        return;
      }
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(function() {
        toast.classList.add('removing');
        setTimeout(function() {
          toast.remove();
        }, 300);
      }, 15000);
    }

    displayTradeHistory();
    setInterval(refreshTradeHistory, 5000);

    // Test toast on load
    window.addEventListener('load', function() {
      console.log('Page loaded, testing toast system');
      setTimeout(function() {
        showToast('Test: Toast system is working!');
      }, 500);
    });

    document.addEventListener('DOMContentLoaded', function() {
      const currentUser = getCurrentUser();
      const select = document.getElementById('user-select');
      select.value = currentUser;
      select.addEventListener('change', function(e) {
        setCurrentUser(e.target.value);
      });

      loadNotificationSettings(currentUser);

      document.getElementById('console-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'console', e.target.checked);
      });
      document.getElementById('email-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'email', e.target.checked);
      });
      document.getElementById('sms-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'sms', e.target.checked);
      });
      document.getElementById('dashboard-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'dashboard', e.target.checked);
        if (e.target.checked) {
          showToast('Dashboard notifications enabled');
        }
      });
    });

    async function getTrades() {
      let response = await fetch(host + "/portfolio/trades?userId=" + getCurrentUser());
      if (!response.ok) {
        throw new Error("Unable to load trade history.");
      }
      let result = await response.json();
      return result;
    }

    function formatTimestamp(timestamp) {
      if (!timestamp) {
        return "Unknown time";
      }

      let parsed = new Date(timestamp);
      if (Number.isNaN(parsed.getTime())) {
        return timestamp;
      }

      return parsed.toLocaleString();
    }

    function tradeToCardHtml(trade) {
      let order = trade.executedOrder || {};
      let stock = order.stock || {};
      let symbol = stock.symbol || "Unknown";
      let side = order.buyOrSell || "Unknown";
      let quantity = Number(order.quantity || 0);
      let quantityType = order.quantityType || "Unknown";
      let status = order.status || "Unknown";
      let price = Number(stock.price || 0);
      let isLimit = order.limitPrice !== undefined && order.limitPrice !== null;
      let orderType = isLimit ? "LIMIT" : "MARKET";

      let displayQuantity = Number.isFinite(quantity) ? quantity.toFixed(4) : "0.0000";
      let displayPrice = Number.isFinite(price) ? price.toFixed(2) : "0.00";

      let totalValue = 0;
      if (quantityType === "SHARES") {
        totalValue = quantity * price;
      } else if (quantityType === "DOLLARS") {
        totalValue = quantity;
      }

      let displayTotal = Number.isFinite(totalValue) ? totalValue.toFixed(2) : "0.00";

      return `
        <article class="trade-card">
          <div class="trade-header">
            <h2>${symbol}</h2>
            <p>${formatTimestamp(trade.timestamp)}</p>
          </div>
          <div class="trade-details">
            <p><strong>Side:</strong> ${side}</p>
            <p><strong>Order Type:</strong> ${orderType}</p>
            <p><strong>Quantity:</strong> ${displayQuantity} ${quantityType}</p>
            <p><strong>Price:</strong> $${displayPrice}</p>
            <p><strong>Total:</strong> $${displayTotal}</p>
            <p><strong>Status:</strong> ${status}</p>
          </div>
        </article>
      `;
    }

    async function displayTradeHistory() {
      let historyList = document.getElementById("history-list");

      try {
        if (trades.length === 0) {
          trades = await getTrades();
        }

        let sortedTrades = trades.slice().sort(function (a, b) {
          let aTime = new Date(a.timestamp).getTime();
          let bTime = new Date(b.timestamp).getTime();
          return bTime - aTime;
        });

        if (sortedTrades.length === 0) {
          historyList.innerHTML = "<p class=\"empty-state\">No trades have executed yet.</p>";
          return;
        }

        historyList.innerHTML = "";

        for (let trade of sortedTrades) {
          let wrapper = document.createElement("div");
          wrapper.innerHTML = tradeToCardHtml(trade);
          historyList.appendChild(wrapper.firstElementChild);
        }
      } catch (error) {
        historyList.innerHTML = "<p class=\"empty-state\">Unable to reach backend.</p>";
      }
    }

    async function refreshTradeHistory() {
      try {
        trades = await getTrades();
        await displayTradeHistory();
      } catch (error) {
      }
    }
  </script>

  <div id="toast-container" class="toast-container"></div>
</body>
</html>
