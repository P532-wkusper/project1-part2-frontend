<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="feed.html">Feed</a>
      <a href="history.html">History</a>
    </nav>
    <div style="float: right; padding: 10px;">
      <label for="user-select" style="color: white; margin-right: 15px;">User:</label>
      <select id="user-select" style="padding: 5px;">
        <option value="user1">user1</option>
        <option value="user2">user2</option>
        <option value="user3">user3</option>
      </select>
      <div id="notification-settings" style="display: inline-block; margin-left: 20px; vertical-align: top;">
        <label style="color: white; margin-right: 10px; font-weight: bold;">Notifications:</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="console-notif" value="console"> Console</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="email-notif" value="email"> Email</label>
        <label style="color: white; margin-right: 10px;"><input type="checkbox" id="sms-notif" value="sms"> SMS</label>
        <label style="color: white;"><input type="checkbox" id="dashboard-notif" value="dashboard"> Dashboard</label>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Portfolio</h1>
      <p>Current cash balance, holdings, and total portfolio value are shown below.</p>
    </section>

    <section class="card">
      <div class="stats-grid">
        <div class="stat">
          <p class="stat-label">Cash Balance</p>
          <p id="balance-value" class="stat-value">Loading...</p>
        </div>
        <div class="stat">
          <p class="stat-label">Total Portfolio Value</p>
          <p id="total-value" class="stat-value">Loading...</p>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Holdings</h2>
      <table>
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Shares</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="holdings-body"></tbody>
      </table>
    </section>
  </main>

  <script>
    let host = "https://trading-simulator-part2-latest.onrender.com";

    let balance = null;
    let totalValue = null;
    let holdings = {};

    function getCurrentUser() {
      return localStorage.getItem('currentUserId') || 'user1';
    }

    function setCurrentUser(userId) {
      localStorage.setItem('currentUserId', userId);
      window.location.reload();
    }

    function loadNotificationSettings(userId) {
      fetch(host + '/portfolio/notificationsettings?userId=' + userId)
        .then(response => response.json())
        .then(data => {
          document.getElementById('console-notif').checked = data.consoleEnabled;
          document.getElementById('email-notif').checked = data.emailEnabled;
          document.getElementById('sms-notif').checked = data.smsEnabled;
          document.getElementById('dashboard-notif').checked = data.dashboardEnabled;
        })
        .catch(error => console.error('Error loading notification settings:', error));
    }

    function updateNotificationSetting(userId, setting, enabled) {
      const params = new URLSearchParams();
      params.append('userId', userId);
      params.append(setting + 'Enabled', enabled);
      
      fetch(host + '/portfolio/notificationsettings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params
      })
      .catch(error => console.error('Error updating notification setting:', error));
    }

    displayPortfolio();
    setInterval(refreshPortfolio, 5000);

    document.addEventListener('DOMContentLoaded', function() {
      const currentUser = getCurrentUser();
      const select = document.getElementById('user-select');
      select.value = currentUser;
      select.addEventListener('change', function(e) {
        setCurrentUser(e.target.value);
      });

      loadNotificationSettings(currentUser);

      document.getElementById('console-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'console', e.target.checked);
      });
      document.getElementById('email-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'email', e.target.checked);
      });
      document.getElementById('sms-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'sms', e.target.checked);
      });
      document.getElementById('dashboard-notif').addEventListener('change', function(e) {
        updateNotificationSetting(currentUser, 'dashboard', e.target.checked);
        if (e.target.checked) {
          showToast('Dashboard notifications enabled');
        }
      });
    });

    function showToast(message) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      container.appendChild(toast);

      setTimeout(function() {
        toast.classList.add('removing');
        setTimeout(function() {
          toast.remove();
        }, 300);
      }, 15000);
    }

    async function getBalance() {
      let response = await fetch(host + "/portfolio/balance?userId=" + getCurrentUser());
      if (!response.ok) {
        throw new Error("Unable to load balance.");
      }
      let result = await response.json();
      return result;
    }

    async function getTotalValue() {
      let response = await fetch(host + "/portfolio/totalvalue?userId=" + getCurrentUser());
      if (!response.ok) {
        throw new Error("Unable to load total value.");
      }
      let result = await response.json();
      return result;
    }

    async function getHoldings() {
      let response = await fetch(host + "/portfolio/holdings?userId=" + getCurrentUser());
      if (!response.ok) {
        throw new Error("Unable to load holdings.");
      }
      let result = await response.json();
      return result;
    }

    async function displayPortfolio() {
      let balanceValue = document.getElementById("balance-value");
      let totalValueElement = document.getElementById("total-value");
      let holdingsBody = document.getElementById("holdings-body");

      try {
        if (balance === null || totalValue === null || Object.keys(holdings).length === 0) {
          balance = await getBalance();
          totalValue = await getTotalValue();
          holdings = await getHoldings();
        }

        balanceValue.textContent = "$" + Number(balance).toFixed(2);
        totalValueElement.textContent = "$" + Number(totalValue).toFixed(2);

        holdingsBody.innerHTML = "";
        let symbols = Object.keys(holdings);

        if (symbols.length === 0) {
          holdingsBody.innerHTML = "<tr><td colspan=\"3\" class=\"empty-state\">No holdings yet.</td></tr>";
          return;
        }

        for (let symbol of symbols) {
          let tradeLink = "order.html?symbol=" + encodeURIComponent(symbol);
          let row = document.createElement("tr");
          row.innerHTML = `
            <td>${symbol}</td>
            <td>${Number(holdings[symbol]).toFixed(4)}</td>
            <td><a class="card-link" href="${tradeLink}">Trade</a></td>
          `;
          holdingsBody.appendChild(row);
        }
      } catch (error) {
        balanceValue.textContent = "Unavailable";
        totalValueElement.textContent = "Unavailable";
        holdingsBody.innerHTML = "<tr><td colspan=\"3\" class=\"empty-state\">Unable to reach backend.</td></tr>";
      }
    }

    async function refreshPortfolio() {
      try {
        let results = await Promise.all([
          getBalance(),
          getTotalValue(),
          getHoldings()
        ]);

        balance = results[0];
        totalValue = results[1];
        holdings = results[2];

        await displayPortfolio();
      } catch (error) {
      }
    }
  </script>

  <div id="toast-container" class="toast-container"></div>
</body>
</html>
